server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_db?TimeZone=UTC
    username: postgres
    password: tushar
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # Force a Postgres-supported timezone at connection startup (avoids JVM default like Asia/Calcutta).
        TimeZone: UTC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

redisson:
  address: redis://localhost:6379
